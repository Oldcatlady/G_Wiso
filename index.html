<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= START PAGE ================= -->
<div id="startPage" class="page active">
    <div class="container">
        <div class="card start-card">

            <div class="quiz-badge">Quiz</div>

            <h1>
                A_Wiso<br>
                <span class="subtitle-title">Märkte, Preisbildung und Marktformen</span>
            </h1>

            <p class="intro-text">
                Wähle dein Theme und starte das Quiz.
            </p>

            <!-- THEMES -->
            <div class="theme-buttons">

                <button class="theme-btn" data-theme="candy" onclick="previewTheme('candy')">
                    <span class="theme-dot" style="background:#ff6fae;"></span>
                    Candy
                </button>

                <button class="theme-btn" data-theme="ocean" onclick="previewTheme('ocean')">
                    <span class="theme-dot" style="background:#2aa7ff;"></span>
                    Ocean
                </button>

                <button class="theme-btn" data-theme="midnight" onclick="previewTheme('midnight')">
                    <span class="theme-dot" style="background:#1b1b2f;"></span>
                    Midnight
                </button>

                <button class="theme-btn" data-theme="crystal" onclick="previewTheme('crystal')">
                    <span class="theme-dot" style="background:#cfe9ff;"></span>
                    Crystal
                </button>

            </div>

            <div id="themePreview" class="theme-preview"></div>

            <button class="start-btn" onclick="startQuiz()">
                Quiz starten →
            </button>

        </div>
    </div>
</div>

<!-- ================= QUIZ PAGE ================= -->
<div id="quizPage" class="page">

    <div class="container">

        <h1 id="quizTitle">Quiz</h1>

        <div class="progress-info">
            <span id="progressText"></span>
            <span id="scoreText"></span>
            <span id="percentText"></span>
        </div>

        <div class="progress-bar">
            <div id="progressFill"></div>
        </div>

        <div class="card">

            <h2 id="question"></h2>

            <div id="answers"></div>

            <input id="textAnswer" type="text" placeholder="Antwort..." style="display:none;">

            <div id="feedback"></div>

            <div class="nav-buttons">

                <button id="prevBtn" onclick="prevQuestion()" style="display:none;">
                    Zurück
                </button>

                <button id="nextBtn" onclick="nextQuestion()">
                    Weiter
                </button>

            </div>

        </div>
    </div>
</div>

<!-- ================= RESULT PAGE ================= -->
<div id="resultPage" class="page">

    <div class="container">

        <div class="card result-card">

            <h2>Ergebnis</h2>

            <div id="resultContent"></div>

            <button onclick="shuffleAndRestart()">Neu starten</button>
            <button onclick="goToStart()">Startseite</button>

        </div>

    </div>

</div>

<!-- ================= TOTENKOPF ================= -->

<button id="skullToggleBtn">💀 Aus</button>

<div id="skull" class="skull-hidden">

    <div class="skull-container">

        <div class="eye-socket left">
            <div class="human-eye">
                <div class="iris"><div class="pupil"></div></div>
            </div>
        </div>

        <div class="eye-socket right">
            <div class="human-eye">
                <div class="iris"><div class="pupil"></div></div>
            </div>
        </div>

        <div class="skull-nose"></div>
        <div class="skull-jaw"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
